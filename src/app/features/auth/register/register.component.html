<div class="auth-container">
  <div class="auth-card">
    <h2>Crear Cuenta</h2>
    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="form-group">
        <label>Nombre de usuario</label>
        <input type="text" [(ngModel)]="username" name="username" required placeholder="juanperez" />
      </div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="correo@ejemplo.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" required minlength="6" placeholder="••••••••" />
      </div>
      @if (error()) {
        <p class="error-msg">{{ error() }}</p>
      }
      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Registrando...' : 'Registrarse' }}
      </button>
    </form>
    <p class="auth-link">
      ¿Ya tienes cuenta? <a routerLink="/auth/login">Iniciar sesión</a>
    </p>
  </div>
</div>
