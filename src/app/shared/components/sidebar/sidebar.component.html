<aside class="sidebar" [class.collapsed]="collapsed()">
  <button class="sidebar-toggle" (click)="toggle()" [title]="collapsed() ? 'Expandir menú' : 'Colapsar menú'">
    @if (collapsed()) {
      <svg lucideChevronRight class="toggle-icon" [size]="16"></svg>
    } @else {
      <svg lucideChevronLeft class="toggle-icon" [size]="16"></svg>
    }
  </button>
  <nav class="sidebar-nav">
    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" [title]="'Dashboard'">
      <svg lucideLayoutGrid class="nav-icon" [size]="18"></svg><span class="nav-label">Dashboard</span>
    </a>
    @if (auth.getUserRole() === 'ADMIN') {
      <a routerLink="/documentos" routerLinkActive="active" [title]="'Documentos'">
        <svg lucideFolder class="nav-icon" [size]="18"></svg><span class="nav-label">Documentos</span>
      </a>
    }
    @if (auth.getUserRole() === 'ADMIN') {
      <a routerLink="/politicas" routerLinkActive="active" [title]="'Políticas'">
        <svg lucideClipboardList class="nav-icon" [size]="18"></svg><span class="nav-label">Políticas</span>
      </a>
      <a routerLink="/monitor" routerLinkActive="active" [title]="'Monitor'">
        <svg lucideMonitor class="nav-icon" [size]="18"></svg><span class="nav-label">Monitor</span>
      </a>
      <a routerLink="/tramites" routerLinkActive="active" [title]="'Trámites'">
        <svg lucideFolderOpen class="nav-icon" [size]="18"></svg><span class="nav-label">Trámites</span>
      </a>
      <a routerLink="/departamentos" routerLinkActive="active" [title]="'Departamentos'">
        <svg lucideBuilding2 class="nav-icon" [size]="18"></svg><span class="nav-label">Departamentos</span>
      </a>
      <a routerLink="/usuarios" routerLinkActive="active" [title]="'Usuarios'">
        <svg lucideUsers class="nav-icon" [size]="18"></svg><span class="nav-label">Usuarios</span>
      </a>
      <a routerLink="/analitica" routerLinkActive="active" [title]="'Analítica'">
        <svg lucideBarChart3 class="nav-icon" [size]="18"></svg><span class="nav-label">Analítica</span>
      </a>
    }
    @if (auth.getUserRole() === 'FUNCIONARIO') {
      <a routerLink="/monitor" routerLinkActive="active" [title]="'Mis Actividades'">
        <svg lucideMonitor class="nav-icon" [size]="18"></svg><span class="nav-label">Mis Actividades</span>
      </a>
    }
    @if (auth.getUserRole() === 'CLIENTE') {
      <a routerLink="/tramites/iniciar" routerLinkActive="active" [title]="'Iniciar Trámite'">
        <svg lucideCirclePlus class="nav-icon" [size]="18"></svg><span class="nav-label">Iniciar Trámite</span>
      </a>
      <a routerLink="/tramites" routerLinkActive="active" [title]="'Mis Trámites'">
        <svg lucideFolderOpen class="nav-icon" [size]="18"></svg><span class="nav-label">Mis Trámites</span>
      </a>
    }
  </nav>
</aside>
